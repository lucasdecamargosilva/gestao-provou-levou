server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Acesso restrito: Basic Auth protege TODO o site, inclusive o
    #    env-config.js (que contém a chave do Supabase). Sem isso, a chave
    #    ficava publicamente acessível. Credencial só com o admin autorizado.
    auth_basic "Provou Levou - Gestao (Acesso Restrito)";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
